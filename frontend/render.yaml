# render.yaml — Render Blueprint for the Dermalyze FastAPI backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: dermalyze-api
    runtime: python
    rootDir: inference_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false          # set to your production frontend URL, e.g. https://dermalyze.onrender.com
      - key: MODEL_CHECKPOINT
        value: /data/models/checkpoint_best.pt
      - key: USE_TTA
        value: "false"       # set to "true" to enable test-time augmentation (slower)
      - key: GEMINI_API_KEY
        sync: false          # set in the Render dashboard — enables dermatoscopic image validation
    disk:
      name: model-storage
      mountPath: /data/models
      sizeGB: 2
