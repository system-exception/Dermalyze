# =============================================================================
# Skin Lesion Classification Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------------------------
data:
  images_dir: data/HAM10000_Training/images
  labels_csv: data/HAM10000_Training/labels_with_metadata.csv
  split_seed: 42
  val_size: 0.15
  test_size: 0.15
  lesion_aware: true
  use_stratified_group_kfold: true
  kfold:
    n_splits: 5
    fold_index: 1
    group_column: lesion_id

  # Metadata Configuration (Optional)
  # Enable to use patient metadata (age, sex, anatomical site) along with images
  # Requires CSV to have columns: age, sex, localization
  use_metadata: true
  metadata_columns: [age_approx, anatom_site, sex]

  # Segmentation-Assisted ROI Crop (Optional)
  segmentation:
    enabled: true
    masks_dir: data/HAM10000_Segmentations
    required: true
    mask_threshold: 10
    crop_margin: 0.10
    filename_suffixes: ["", "_segmentation", "_mask"]

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
model:
  backbone: efficientnetv2_s
  num_classes: 7
  image_size: 224
  pretrained: true
  dropout_rate: 0.37606099749584054
  freeze_backbone: false

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
training:
  seed: 42
  batch_size: 32
  epochs: 45
  lr: 0.000688152438667204
  weight_decay: 0.022225433823808757

  # Two-Stage Training
  stage1_epochs: 2
  stage1_lr: 0.00007168802082137062
  stage1_weight_decay: 0.005645066779546339
  stage2_epochs: 27
  stage_epoch_mode: fit_total
  stage2_lr: 0.000688152438667204
  stage2_weight_decay: 0.022225433823808757

  # Data Loading
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  use_weighted_sampling: true
  sampling_weight_power: 0.75
  sampling_weight_min: 0.35
  sampling_weight_max: 5.0
  augmentation:
    type: randaugment
    minority_boost: true
    mel_magnitude: 12
    df_magnitude: 15

  # Performance Optimizations
  use_amp: true
  use_gradient_checkpointing: true
  gradient_accumulation_steps: 2

  # Data Augmentation
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  mixup_prob: 0.0
  cutmix_prob: 0.0

  # Learning Rate Scheduler
  scheduler:
    type: cosine
    # warmup_pct: 0.05
    # Cosine scheduler options (if type: cosine):
    T_0: 23
    T_mult: 2
    eta_min: 0.0000023756682069254373

  # Exponential Moving Average
  ema:
    enabled: true
    decay: 0.9959603160258538
    use_for_eval: true
    save_best: true

  # Early Stopping
  early_stopping_patience: 12

# -----------------------------------------------------------------------------
# Loss Function
# -----------------------------------------------------------------------------
loss:
  type: label_smoothing
  alpha: null
  label_smoothing: 0.05300178274831856
  class_weight_power: 0.0

# -----------------------------------------------------------------------------
# Output Configuration
# -----------------------------------------------------------------------------
output:
  save_epoch_checkpoints: false

# -----------------------------------------------------------------------------
# Evaluation Configuration
# -----------------------------------------------------------------------------
evaluation:
  tta:
    use_tta: true
    mode: full
    aggregation: mean
    use_clahe_tta: true
    clahe_clip_limit: 2.0
    clahe_grid_size: 8
